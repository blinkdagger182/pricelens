name: PriceLens
options:
  bundleIdPrefix: com.pricelens
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  PriceLens:
    type: application
    platform: iOS
    sources:
      - PriceLens
    resources:
      - PriceLens/Resources
    info:
      path: PriceLens/Resources/Info.plist
      properties:
        CFBundleDisplayName: PriceLens
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "PriceLens uses your camera to scan price tags and convert prices."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pricelens.app
        INFOPLIST_FILE: PriceLens/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""

